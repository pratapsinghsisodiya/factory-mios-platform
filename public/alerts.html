<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Alerts — MACHINE-001</title>
<link rel="stylesheet" href="/_shared.css"/>
<style>
.page{padding:20px 24px 60px;}
/* Tabs */
.tab-bar{display:flex;gap:0;background:var(--card);border-bottom:1px solid var(--border);padding:0 20px;}
.tab{padding:14px 22px;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--cyan);border-bottom-color:var(--cyan);}
.tab-content{display:none;}
.tab-content.active{display:block;}
/* Critical alert banner */
.crit-banner{background:rgba(255,68,68,.12);border:1px solid rgba(255,68,68,.3);border-radius:10px;padding:12px 18px;margin-bottom:16px;display:none;align-items:center;gap:12px;color:var(--red);font-weight:700;}
.crit-banner.show{display:flex;}
/* Sections */
.section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px;}
.section-title{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;}
/* Buttons */
.btn-primary{padding:9px 18px;background:var(--cyan);color:#000;border:none;border-radius:8px;font-size:13px;font-weight:800;cursor:pointer;transition:opacity .2s;}
.btn-primary:hover{opacity:.85;}
.btn-danger{padding:5px 10px;background:rgba(255,68,68,.15);color:var(--red);border:1px solid rgba(255,68,68,.3);border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;}
.btn-danger:hover{background:rgba(255,68,68,.3);}
.btn-edit{padding:5px 10px;background:rgba(0,212,255,.1);color:var(--cyan);border:1px solid rgba(0,212,255,.25);border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;margin-right:4px;}
.btn-edit:hover{background:rgba(0,212,255,.25);}
.btn-clear{padding:7px 14px;background:rgba(255,68,68,.1);color:var(--red);border:1px solid rgba(255,68,68,.25);border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;}
.btn-clear:hover{background:rgba(255,68,68,.2);}
.btn-save{padding:9px 20px;background:var(--green);color:#000;border:none;border-radius:8px;font-size:13px;font-weight:800;cursor:pointer;}
.btn-save:hover{opacity:.85;}
/* Rules list */
.rule-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px 18px;display:flex;align-items:center;gap:16px;margin-bottom:10px;transition:border .2s;}
.rule-card:hover{border-color:var(--border2,#243f6a);}
.rule-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;background:var(--card);flex-shrink:0;}
.rule-info{flex:1;min-width:0;}
.rule-name{font-size:14px;font-weight:700;}
.rule-cond{font-size:12px;color:var(--muted);margin-top:3px;font-family:monospace;}
.rule-badges{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;}
.rbadge{font-size:10px;padding:2px 9px;border-radius:10px;font-weight:700;}
.rb-crit{background:rgba(255,68,68,.15);color:var(--red);}
.rb-warn{background:rgba(255,179,0,.15);color:var(--amber);}
.rb-info{background:rgba(68,136,255,.15);color:#4488ff;}
.rb-on{background:rgba(0,255,136,.12);color:var(--green);}
.rb-off{background:rgba(255,255,255,.06);color:var(--muted);}
.rule-actions{display:flex;gap:6px;flex-shrink:0;}
/* Toggle */
.toggle{position:relative;display:inline-block;width:38px;height:20px;}
.toggle input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;inset:0;background:#2a3a55;border-radius:20px;cursor:pointer;transition:background .2s;}
.toggle-slider:before{content:'';position:absolute;width:14px;height:14px;left:3px;top:3px;background:#6b8cae;border-radius:50%;transition:all .2s;}
.toggle input:checked + .toggle-slider{background:rgba(0,255,136,.3);}
.toggle input:checked + .toggle-slider:before{background:var(--green);transform:translateX(18px);}
/* History timeline */
.hist-item{display:flex;align-items:flex-start;gap:14px;padding:10px 0;border-bottom:1px solid rgba(26,47,85,.4);}
.hist-item:last-child{border-bottom:none;}
.hist-dot{width:10px;height:10px;border-radius:50%;margin-top:4px;flex-shrink:0;}
.hist-dot.crit{background:var(--red);box-shadow:0 0 6px rgba(255,68,68,.5);}
.hist-dot.warn{background:var(--amber);box-shadow:0 0 6px rgba(255,179,0,.4);}
.hist-dot.info{background:#4488ff;}
.hist-body{flex:1;}
.hist-title{font-size:13px;font-weight:600;}
.hist-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.hist-time{font-size:11px;color:var(--muted);white-space:nowrap;}
/* Notif config */
.notif-section{margin-bottom:20px;}
.notif-section h3{font-size:13px;font-weight:700;color:var(--text);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.f-group{display:flex;flex-direction:column;gap:5px;}
.f-group label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;font-weight:700;}
.f-group input,.f-group select,.f-group textarea{background:var(--panel);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:8px;font-size:13px;font-family:inherit;outline:none;}
.f-group input:focus,.f-group select:focus{border-color:var(--cyan);}
.f-full{grid-column:span 2;}
/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:900;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;width:min(560px,95vw);max-height:90vh;overflow-y:auto;}
.modal h2{font-size:16px;font-weight:800;color:var(--cyan);margin-bottom:20px;}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.mg-full{grid-column:span 2;}
.modal-actions{display:flex;gap:10px;margin-top:20px;}
.btn-cancel{padding:10px 22px;background:rgba(255,255,255,.06);color:var(--text);border:1px solid var(--border);border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;}
@media(max-width:700px){.form-grid,.modal-grid{grid-template-columns:1fr;}.f-full,.mg-full{grid-column:span 1;}}
</style>
</head>
<body>
<header class="z-header">
  <a href="/" class="z-logo">
    <div class="z-logo-icon">Z</div>
    <div><div class="z-logo-name">FACTORY-MIOS</div><div class="z-logo-sub">MACHINE-001</div></div>
  </a>
  <div class="z-hdr-right">
    <span id="z-clock" style="font-size:14px;font-variant-numeric:tabular-nums;color:var(--muted);"></span>
  </div>
</header>
<nav class="z-nav" id="z-nav"></nav>

<div class="tab-bar">
  <div class="tab active" onclick="switchTab('rules',this)">Alert Rules</div>
  <div class="tab" onclick="switchTab('history',this)">Alert History</div>
  <div class="tab" onclick="switchTab('notif',this)">Notifications Config</div>
</div>

<div class="page">
  <!-- Critical alert banner -->
  <div class="crit-banner" id="critBanner">
    <span style="font-size:18px;">&#9888;</span>
    <span id="critText">Critical alert active</span>
  </div>

  <!-- RULES TAB -->
  <div class="tab-content active" id="tab-rules">
    <div class="section">
      <div class="section-title">
        <span>Alert Rules</span>
        <button class="btn-primary" onclick="openRuleModal()">+ Add Rule</button>
      </div>
      <div id="rulesList"><div style="text-align:center;padding:24px;color:var(--muted)">Loading rules...</div></div>
    </div>
  </div>

  <!-- HISTORY TAB -->
  <div class="tab-content" id="tab-history">
    <div class="section">
      <div class="section-title">
        <span>Alert History</span>
        <button class="btn-clear" onclick="clearHistory()">Clear History</button>
      </div>
      <div id="histList"><div style="text-align:center;padding:24px;color:var(--muted)">Loading history...</div></div>
    </div>
  </div>

  <!-- NOTIFICATIONS CONFIG TAB -->
  <div class="tab-content" id="tab-notif">
    <div class="section">
      <div class="notif-section">
        <h3>Email (SMTP) Configuration</h3>
        <div class="form-grid">
          <div class="f-group"><label>SMTP Host</label><input type="text" id="smtp-host" placeholder="smtp.gmail.com"/></div>
          <div class="f-group"><label>Port</label><input type="number" id="smtp-port" placeholder="587"/></div>
          <div class="f-group"><label>Username / Email</label><input type="text" id="smtp-user" placeholder="alerts@company.com"/></div>
          <div class="f-group"><label>Password</label><input type="password" id="smtp-pass" placeholder="App password"/></div>
          <div class="f-group f-full"><label>Recipients (comma separated)</label><input type="text" id="smtp-to" placeholder="manager@company.com, supervisor@company.com"/></div>
        </div>
        <button class="btn-save" onclick="saveNotifConfig('email')">Save Email Config</button>
      </div>
      <div class="notif-section">
        <h3>WhatsApp Webhook Configuration</h3>
        <div class="form-grid">
          <div class="f-group f-full"><label>Webhook URL</label><input type="url" id="wa-url" placeholder="https://api.whatsapp-webhook.com/send"/></div>
          <div class="f-group"><label>API Key / Token</label><input type="text" id="wa-token" placeholder="Bearer token or API key"/></div>
          <div class="f-group"><label>Phone Number(s)</label><input type="text" id="wa-phone" placeholder="+91 98765 43210"/></div>
        </div>
        <button class="btn-save" onclick="saveNotifConfig('whatsapp')">Save WhatsApp Config</button>
      </div>
    </div>
  </div>
</div>

<!-- Add/Edit Rule Modal -->
<div class="modal-overlay" id="ruleModal">
  <div class="modal">
    <h2 id="ruleModalTitle">Add Alert Rule</h2>
    <input type="hidden" id="r-id"/>
    <div class="modal-grid">
      <div class="f-group mg-full"><label>Rule Name *</label><input type="text" id="r-name" placeholder="e.g. OEE Below Target"/></div>
      <div class="f-group"><label>Metric *</label>
        <select id="r-metric">
          <option value="oee">OEE</option>
          <option value="feed_rate">Feed Rate</option>
          <option value="spindle_speed">Spindle Speed</option>
          <option value="cycle_time">Cycle Time</option>
          <option value="alarm">Alarm</option>
          <option value="downtime">Downtime</option>
          <option value="rejection_rate">Rejection Rate</option>
        </select>
      </div>
      <div class="f-group"><label>Condition *</label>
        <select id="r-condition">
          <option value="lt">Less than (&lt;)</option>
          <option value="gt">Greater than (&gt;)</option>
          <option value="eq">Equal to (=)</option>
          <option value="lte">Less than or equal (≤)</option>
          <option value="gte">Greater than or equal (≥)</option>
        </select>
      </div>
      <div class="f-group"><label>Threshold Value *</label><input type="number" id="r-threshold" placeholder="e.g. 65"/></div>
      <div class="f-group"><label>Severity *</label>
        <select id="r-severity">
          <option value="CRITICAL">Critical</option>
          <option value="WARNING">Warning</option>
          <option value="INFO">Info</option>
        </select>
      </div>
      <div class="f-group" style="align-items:flex-start;">
        <label>Enabled</label>
        <label class="toggle" style="margin-top:8px;">
          <input type="checkbox" id="r-enabled" checked/>
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-primary" onclick="saveRule()">Save Rule</button>
      <button class="btn-cancel" onclick="closeRuleModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
let allRules = [];
let allHistory = [];
let editingRuleId = null;

function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'history') loadHistory();
}

// ── RULES ─────────────────────────────────────────────────────────
async function loadRules() {
  try {
    const data = await zFetch('/api/alerts/rules');
    allRules = Array.isArray(data) ? data : (data.data || data.rules || []);
    checkCritical();
    renderRules();
  } catch(e) {
    document.getElementById('rulesList').innerHTML = '<div style="color:var(--muted);text-align:center;padding:24px;">Could not load alert rules</div>';
  }
}

function checkCritical() {
  const crit = allRules.filter(r => r.severity === 'CRITICAL' && r.enabled && r.triggered);
  const banner = document.getElementById('critBanner');
  if (crit.length > 0) {
    banner.classList.add('show');
    document.getElementById('critText').textContent = crit.length + ' critical alert' + (crit.length > 1 ? 's' : '') + ' active: ' + crit.map(r => r.name).join(', ');
  } else {
    banner.classList.remove('show');
  }
}

const METRIC_ICONS = { oee: '📊', feed_rate: '⚡', spindle_speed: '🔄', cycle_time: '⏱', alarm: '🚨', downtime: '⏸', rejection_rate: '❌' };
const COND_LABELS = { lt: '<', gt: '>', eq: '=', lte: '≤', gte: '≥' };

function renderRules() {
  const el = document.getElementById('rulesList');
  if (!allRules.length) {
    el.innerHTML = '<div style="text-align:center;padding:32px;color:var(--muted);">No alert rules configured. Add your first rule.</div>';
    return;
  }
  el.innerHTML = allRules.map(r => {
    const sevCls = r.severity === 'CRITICAL' ? 'rb-crit' : r.severity === 'WARNING' ? 'rb-warn' : 'rb-info';
    const enabledCls = r.enabled ? 'rb-on' : 'rb-off';
    const cond = COND_LABELS[r.condition] || r.condition || '';
    const icon = METRIC_ICONS[r.metric] || '📡';
    return `<div class="rule-card">
      <div class="rule-icon">${icon}</div>
      <div class="rule-info">
        <div class="rule-name">${r.name || 'Unnamed Rule'}</div>
        <div class="rule-cond">${r.metric || '--'} ${cond} ${r.threshold != null ? r.threshold : '--'}</div>
        <div class="rule-badges">
          <span class="rbadge ${sevCls}">${r.severity || 'INFO'}</span>
          <span class="rbadge ${enabledCls}">${r.enabled ? 'ENABLED' : 'DISABLED'}</span>
        </div>
      </div>
      <div class="rule-actions">
        <button class="btn-edit" onclick="openEditRuleModal(${r.id})">Edit</button>
        <button class="btn-danger" onclick="delRule(${r.id})">Delete</button>
      </div>
    </div>`;
  }).join('');
}

function openRuleModal() {
  editingRuleId = null;
  document.getElementById('ruleModalTitle').textContent = 'Add Alert Rule';
  document.getElementById('r-id').value = '';
  document.getElementById('r-name').value = '';
  document.getElementById('r-metric').value = 'oee';
  document.getElementById('r-condition').value = 'lt';
  document.getElementById('r-threshold').value = '';
  document.getElementById('r-severity').value = 'WARNING';
  document.getElementById('r-enabled').checked = true;
  document.getElementById('ruleModal').classList.add('open');
}

function openEditRuleModal(id) {
  const r = allRules.find(x => x.id === id);
  if (!r) return;
  editingRuleId = id;
  document.getElementById('ruleModalTitle').textContent = 'Edit Alert Rule';
  document.getElementById('r-id').value = id;
  document.getElementById('r-name').value = r.name || '';
  document.getElementById('r-metric').value = r.metric || 'oee';
  document.getElementById('r-condition').value = r.condition || 'lt';
  document.getElementById('r-threshold').value = r.threshold != null ? r.threshold : '';
  document.getElementById('r-severity').value = r.severity || 'WARNING';
  document.getElementById('r-enabled').checked = !!r.enabled;
  document.getElementById('ruleModal').classList.add('open');
}

function closeRuleModal() { document.getElementById('ruleModal').classList.remove('open'); }

async function saveRule() {
  const body = {
    name: document.getElementById('r-name').value.trim(),
    metric: document.getElementById('r-metric').value,
    condition: document.getElementById('r-condition').value,
    threshold: parseFloat(document.getElementById('r-threshold').value),
    severity: document.getElementById('r-severity').value,
    enabled: document.getElementById('r-enabled').checked
  };
  if (!body.name || isNaN(body.threshold)) { zToast('Name and Threshold are required', 'error'); return; }
  try {
    let r;
    if (editingRuleId) {
      r = await zFetch('/api/alerts/rules/' + editingRuleId, {
        method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body)
      });
    } else {
      r = await zFetch('/api/alerts/rules', {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body)
      });
    }
    if (r && (r.ok || r.id || r.success)) {
      zToast(editingRuleId ? 'Rule updated' : 'Rule added', 'success');
      closeRuleModal();
      loadRules();
    } else {
      zToast('Error: ' + (r.error || 'Save failed'), 'error');
    }
  } catch(e) { zToast('Network error', 'error'); }
}

async function delRule(id) {
  if (!confirm('Delete this alert rule?')) return;
  try {
    await zFetch('/api/alerts/rules/' + id, { method: 'DELETE' });
    zToast('Rule deleted', 'success');
    loadRules();
  } catch(e) { zToast('Delete failed', 'error'); }
}

// ── HISTORY ──────────────────────────────────────────────────────
async function loadHistory() {
  try {
    const data = await zFetch('/api/alerts/history');
    allHistory = Array.isArray(data) ? data : (data.data || data.history || []);
    renderHistory();
  } catch(e) {
    document.getElementById('histList').innerHTML = '<div style="color:var(--muted);text-align:center;padding:24px;">Could not load history</div>';
  }
}

function renderHistory() {
  const el = document.getElementById('histList');
  if (!allHistory.length) {
    el.innerHTML = '<div style="text-align:center;padding:32px;color:var(--muted);">No alert history</div>';
    return;
  }
  el.innerHTML = allHistory.map(h => {
    const sev = (h.severity || 'INFO').toUpperCase();
    const dotCls = sev === 'CRITICAL' ? 'crit' : sev === 'WARNING' ? 'warn' : 'info';
    const ts = h.triggered_at || h.created_at || h.timestamp;
    const timeStr = ts ? new Date(ts).toLocaleString('en-IN', { timeZone: 'Asia/Kolkata', day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit', hour12: false }) : '--';
    const val = h.value != null ? fmtNum(h.value, 2) : '--';
    const thresh = h.threshold != null ? h.threshold : '--';
    return `<div class="hist-item">
      <div class="hist-dot ${dotCls}"></div>
      <div class="hist-body">
        <div class="hist-title">${h.rule_name || h.name || 'Alert'}</div>
        <div class="hist-meta">${h.metric || '--'} = ${val} (threshold: ${thresh}) · ${sev}</div>
      </div>
      <div class="hist-time">${timeStr}</div>
    </div>`;
  }).join('');
}

async function clearHistory() {
  if (!confirm('Clear all alert history? This cannot be undone.')) return;
  try {
    await zFetch('/api/alerts/history', { method: 'DELETE' });
    zToast('History cleared', 'success');
    allHistory = [];
    renderHistory();
  } catch(e) { zToast('Failed to clear history', 'error'); }
}

// ── NOTIFICATIONS CONFIG ──────────────────────────────────────────
async function saveNotifConfig(type) {
  let body = {};
  if (type === 'email') {
    body = {
      type: 'email',
      host: document.getElementById('smtp-host').value,
      port: parseInt(document.getElementById('smtp-port').value) || 587,
      username: document.getElementById('smtp-user').value,
      password: document.getElementById('smtp-pass').value,
      recipients: document.getElementById('smtp-to').value
    };
    if (!body.host || !body.username) { zToast('SMTP Host and Username are required', 'error'); return; }
  } else {
    body = {
      type: 'whatsapp',
      webhook_url: document.getElementById('wa-url').value,
      token: document.getElementById('wa-token').value,
      phone: document.getElementById('wa-phone').value
    };
    if (!body.webhook_url) { zToast('Webhook URL is required', 'error'); return; }
  }
  try {
    const r = await zFetch('/api/alerts/config', {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body)
    });
    if (r && (r.ok || r.success)) {
      zToast((type === 'email' ? 'Email' : 'WhatsApp') + ' config saved', 'success');
    } else {
      zToast('Saved (server response: ' + JSON.stringify(r).slice(0, 60) + ')', 'success');
    }
  } catch(e) { zToast('Network error', 'error'); }
}

loadRules();
</script>
<script src="/_shared.js"></script>
</body>
</html>
